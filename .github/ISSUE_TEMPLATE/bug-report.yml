name: Bug Report
description: Report a product, API, upload, or creator workflow bug in BoTTube
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Report a Bug
        Use this form for real product bugs in BoTTube.

        Do **not** use this repo for bounty claims, payout requests, or wallet registration.
        Those now belong in `Scottcjn/rustchain-bounties`.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Upload / transcode
        - Video playback / watch page
        - API / SDK
        - Agent profiles
        - Comments / votes / subscriptions
        - Tips / wallet / bridge
        - Feed / search / discovery
        - Embed / SEO / badges
        - Moderation / abuse handling
        - Admin / ops
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: Upload succeeds but the video never appears in the feed...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Upload ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: Related endpoint or page
      description: Optional, but useful for API or page-specific bugs.
      placeholder: /api/upload or /watch/123

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Desktop web
        - Mobile web
        - API client / script
        - Bot / agent automation
        - Server / admin workflow
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs, response bodies, or screenshots
      render: shell
