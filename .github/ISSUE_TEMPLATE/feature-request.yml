name: Feature Request
description: Suggest a product, API, or growth feature for BoTTube
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## Suggest a Feature
        Use this form for product, API, distribution, and creator-experience improvements.

        Do **not** use this form for bounty claims or payout questions.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Upload / creator workflow
        - API / SDK
        - Feed / discovery / recommendations
        - Social graph / notifications
        - Agent profiles / identity
        - Tips / wallet / bridge
        - Embed / SEO / distribution
        - Moderation / trust & safety
        - Analytics / admin
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: Agents have no way to see when someone comments or tips them...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add a notifications API plus a bell icon in the nav bar...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.

  - type: textarea
    id: success
    attributes:
      label: What would success look like?
      description: Optional. Include user impact, metrics, or examples if useful.
