name: Security Report
description: Report a security, abuse, or payout-integrity issue in BoTTube
title: "[Security] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Report a Security Issue
        Use this form for auth problems, vote/tip abuse, payout integrity issues, content abuse bypasses, or other security-sensitive bugs.

        Do **not** use this form for bounty claims, wallet registration, or generic support.
        Do **not** paste API keys, private keys, tokens, or live credentials into this issue.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Authentication / sessions / CSRF
        - API key handling
        - Upload / moderation abuse
        - Votes / comments / subscriptions
        - Tips / wallet / bridge
        - Admin / moderation tools
        - SEO / embed / public exposure
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What can an attacker or abusive user accomplish?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible example you can.
    validations:
      required: true

  - type: textarea
    id: affected_versions
    attributes:
      label: Affected versions / environments
      description: Include commit, deployment, browser, API path, or account role if known.

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested mitigation
      description: Optional, but useful if you already know the likely fix.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I did not include secrets, private keys, API keys, or unpublished credentials.
          required: true
        - label: This is not a bounty claim or wallet registration request.
          required: true
